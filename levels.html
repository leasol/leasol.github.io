<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Levels</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background 0.5s ease;
        }

        .back-btn {
            position: relative;
            display: inline-block;
            padding: 14px 28px;
            margin-bottom: 25px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(6px);
            color: #fff;
            font-size: 20px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.25);
            transition: 0.3s ease;
        }

        .back-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.4);
        }

        h1 {
            width: 100%;
            text-align: center;
            color: #fff;
            margin-bottom: 40px;
            font-size: 40px;
            text-shadow: 0 0 15px rgba(0, 0, 0, 0.4);
            transition: all 0.4s ease;
        }

        details {
            width: 100%;
            max-width: 900px;
            margin-bottom: 25px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 10px 20px;
            backdrop-filter: blur(5px);
        }

        summary {
            font-size: 30px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            padding: 10px 0;
        }

        .levels-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
            padding-bottom: 10px;
        }

        .level-btn {
            width: 160px;
            height: 160px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 22px;
            cursor: pointer;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            transition: all 0.3s ease;
            background: linear-gradient(145deg, #fff, #e0e0e0);
            color: #333;
            box-shadow: 5px 5px 15px rgba(0, 0, 0, 0.2),
                -5px -5px 15px rgba(255, 255, 255, 0.5);
        }

        .level-btn:hover {
            transform: translateY(-5px) scale(1.05);
        }
    </style>

    <script>
        const themes = {
            actorquiz: {
                bg: "linear-gradient(to right, #142e5e, #3562cc)",
                btn: "linear-gradient(145deg, #87c1fe, #98cafd)",
                btnText: "#ffffff",
                hover: "0 0 25px #54678a"
            },

            carlogoquiz: {
                bg: "linear-gradient(to right, #0b2e1d, #1d5b3a)",
                btn: "linear-gradient(145deg, #3d8b5a, #4fae72)",
                btnText: "#ffffff",
                hover: "0 0 25px #4fae72"
            },

            dragonquiz: {
                bg: "linear-gradient(to right, #ff6a00, #ffb300)",
                btn: "linear-gradient(145deg, #ff8c00, #ffd54f)",
                btnText: "#ffffff",
                hover: "0 0 25px #ffd54f"
            },

            emojiquiz: {
                bg: "linear-gradient(to right, #2B004A, #6A0DAD)",
                btn: "linear-gradient(145deg, #9B30FF, #D8B4FF)",
                btnText: "#ffffff",
                hover: "0 0 25px #D8B4FF"
            },

            flagsquiz: {
                bg: "linear-gradient(to right, #44293e, #60b4e9)",
                btn: "linear-gradient(145deg, #60b4e9, #7bcaff)",
                btnText: "#ffffff",
                hover: "0 0 25px #60b4e9"
            },

            impossiblequiz: {
                bg: "linear-gradient(to right, #311B92, #00E5FF)",
                btn: "linear-gradient(145deg, #00E5FF, #7ff5ff)",
                btnText: "#000000",
                hover: "0 0 25px #00E5FF"
            },

            landmarksquiz: {
                bg: "linear-gradient(to right, #2E3192, #1BFFFF)",
                btn: "linear-gradient(145deg, #6A82FB, #FC5C7D)",
                btnText: "#ffffff",
                hover: "0 0 25px #6A82FB"
            },

            logoquiz: {
                bg: "linear-gradient(to right, #1E0E0B, #3c1c14)",
                btn: "linear-gradient(145deg, #D9A236, #F5D49B)",
                btnText: "#ffffff",
                hover: "0 0 25px #CC7A56"
            },

            mindblowquiz: {
                bg: "linear-gradient(to right, #ff416c, #ff4b2b)",
                btn: "linear-gradient(145deg, #ff758c, #ff7eb3)",
                btnText: "#ffffff",
                hover: "0 0 25px #ff4b2b"
            },

            qetflix: {
                bg: "linear-gradient(to right, #141414, #000000)",
                btn: "linear-gradient(145deg, #E50914, #B81D24)",
                btnText: "#ffffff",
                hover: "0 0 25px #E50914"
            },

            pokemonquiz: {
                bg: "linear-gradient(to right, #FF0000, #ffffff, #000000)",
                btn: "linear-gradient(145deg, #FF0000, #FFC0C0)",
                btnText: "#ffffff",
                hover: "0 0 25px #FF0000"
            },

            steretypesquiz: {
                bg: "linear-gradient(to right, #ff0066, #ffcc00)",
                btn: "linear-gradient(145deg, #ff6699, #ffdd55)",
                btnText: "#000000",
                hover: "0 0 25px #ff6699"
            },

            soccerquiz: {
                bg: "linear-gradient(to right, #003300, #00cc66)",
                btn: "linear-gradient(145deg, #00aa55, #66ffcc)",
                btnText: "#ffffff",
                hover: "0 0 25px #00ff99"
            },

            gotquiz: {
                bg: "linear-gradient(to right, #141414, #000000)",
                btn: "linear-gradient(145deg, #E50914, #B81D24)",
                btnText: "#ffffff",
                hover: "0 0 25px #E50914"
            },
        };

        function applyTheme(quizKey) {
            const theme = themes[quizKey];
            if (!theme) return;

            document.body.style.background = theme.bg;
            const h1 = document.getElementById("quiz-title");
            if (h1) h1.style.textShadow = theme.hover;

            const style = document.createElement("style");
            style.innerHTML = `
                .level-btn {
                    background: ${theme.btn} !important;
                    color: ${theme.btnText} !important;
                    box-shadow: 6px 6px 18px rgba(0,0,0,0.25),
                                -4px -4px 15px rgba(255,255,255,0.5);
                }

                .level-btn:hover {
                    box-shadow: ${theme.hover};
                }
            `;
            document.head.appendChild(style);
        }
    </script>
</head>

<body>

    <a href="./index.html" class="back-btn">← Back to All Apps</a>

    <img id="quiz-icon" src="" alt="Quiz Icon"
        style="width: 259px; height: 250px; margin-bottom: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">

    <h1 id="quiz-title"></h1>

    <script>
        const quizzes = {
            logoquiz: {
                name: "Logo Quiz",
                json: "./logoquiz/json/sorted.json",
                images: "./logoquiz/proced/",
                type: "list"
            },

            actorquiz: {
                name: "Actor Quiz",
                type: "categories",
                categories: {
                    "Next Gen Collection": {
                        json: "./actorquiz/json/newactors.json",
                        images: "./actorquiz/toons",
                        type: "dict"
                    },
                    "Childhood Pictures": {
                        json: "./actorquiz/json/celebrities.json",
                        images: "./actorquiz/left",
                        type: "dict"
                    },
                    "Up Close & Personal": {
                        json: "./actorquiz/json/actors.json",
                        images: "./actorquiz/originals_scaled",
                        type: "dict"
                    },
                    "Legacy Collection": {
                        json: "./actorquiz/json/actors.json",
                        images: "./actorquiz/toons_scaled",
                        type: "dict"
                    }
                }
            },

            dragonquiz: {
                name: "Dragon Quiz",
                type: "categories",
                categories: {
                    "Dragon Ball": {
                        json: "./dragonquiz/dragon_jsons/Dragon Ball.json",
                        images: "./dragonquiz/Dragon Ball/Gemini",
                        type: "list"
                    },
                    "Dragon Ball Z": {
                        json: "./dragonquiz/dragon_jsons/Dragon Ball Z.json",
                        images: "./dragonquiz/Dragon Ball Z/Gemini",
                        type: "list"
                    },
                    "Dragon Ball GT": {
                        json: "./dragonquiz/dragon_jsons/Dragon Ball GT.json",
                        images: "./dragonquiz/Dragon Ball GT/Gemini",
                        type: "list"
                    },
                    "Dragon Ball Super": {
                        json: "./dragonquiz/dragon_jsons/Dragon Ball Super.json",
                        images: "./dragonquiz/Dragon Ball Super/Gemini",
                        type: "list"
                    },
                    "Dragon Ball Daima": {
                        json: "./dragonquiz/dragon_jsons/Dragon Ball Daima.json",
                        images: "./dragonquiz/Dragon Ball Daima/Gemini",
                        type: "list"
                    },
                    "Dragon Ball Heroes": {
                        json: "./dragonquiz/dragon_jsons/Dragon Ball Heroes.json",
                        images: "./dragonquiz/Dragon Ball Heroes/Gemini",
                        type: "list"
                    },
                    "Dragon Ball Games": {
                        json: "./dragonquiz/dragon_jsons/Dragon Ball Games.json",
                        images: "./dragonquiz/Dragon Ball Games/Gemini",
                        type: "list"
                    }
                }
            },

            carlogoquiz: {
                name: "Car Logo Quiz",
                json: "./carlogoquiz/json/sorted.json",
                images: "./carlogoquiz/toons_scaled",
                type: "list"
            },

            emojiquiz: {
                name: "Emoji Quiz",
                json: "./emojiquiz/json/sorted.json",
                images: "emoji",
                type: "dict"
            },

            flagsquiz: {
                name: "Flags Quiz",
                json: "./flagsquiz/json/sorted.json",
                images: "./flagsquiz/toons_scaled",
                type: "list"
            },

            impossiblequiz: {
                name: "Impossible Quiz",
                json: "./impossiblequiz/json/sorted.json",
                images: "./impossiblequiz/originals_scaled",
                type: "list"
            },

            landmarksquiz: {
                name: "Landmarks Quiz",
                json: "./landmarksquiz/json/sorted.json",
                images: "./landmarksquiz/originals_scaled",
                type: "list"
            },

            mindblowquiz: {
                name: "Mindblow Quiz",
                json: "./mindblowquiz/json/sorted.json",
                images: "./mindblowquiz/json",
                type: "list"
            },

            pokemonquiz: {
                name: "Pokemon Quiz",
                json: "./pokemonquiz/json/sorted.json",
                images: "./pokemonquiz/toons_scaled",
                type: "generations",
                counts: [151, 100, 135, 107, 156, 72, 88, 89, 120]
            },

            steretypesquiz: {
                name: "Stereotypes Quiz",
                json: "./steretypesquiz/json/sorted.json",
                images: "./steretypesquiz/toons1",
                type: "list"
            },

            qetflix: {
                name: "Qetflix Quiz",
                json: "./netflix_titles_backup/ordered_titles.json",
                images: "./netflix_titles_backup/toons_scaled",
                type: "list"
            },

            soccerquiz: {
                name: "Soccer Quiz",
                json: "./soccerquiz/json/sorted.json",
                images: "./soccerquiz/proced",
                type: "list"
            },

            gotquiz: {
                name: "Quiz of Thrones",
                type: "categories",
                categories: {
                    "Game of Thrones": {
                        json: "./gotquiz/json/got.json",
                        images: "./gotquiz/got",
                        type: "dict"
                    },
                    "House of the Dragon": {
                        json: "./gotquiz/json/hotd.json",
                        images: "./gotquiz/hotd",
                        type: "dict"
                    },
                }
            },
        };

        const urlParams = new URLSearchParams(window.location.search);
        const quizKey = urlParams.get("quiz");

        if (!quizKey || !quizzes[quizKey]) {
            document.body.innerHTML = "<h2>Quiz not found</h2>";
            throw new Error("Quiz not found");
        }

        applyTheme(quizKey);

        const quiz = quizzes[quizKey];
        document.getElementById("quiz-title").textContent = quiz.name + " - Answers";

        const quizIcons = {
            actorquiz: "./icons/com.soldar.famousquiz.png",
            carlogoquiz: "./icons/com.soldar.carlogoquiz.png",
            dragonquiz: "./icons/com.soldar.dragonquiz.png",
            pokemonquiz: "./icons/com.soldar.creaturequiz.png",
            emojiquiz: "./icons/com.soldar.emojiquiz.png",
            flagsquiz: "./icons/com.soldar.flagquiz.png",
            impossiblequiz: "./icons/com.soldar.impossiblequiz.png",
            landmarksquiz: "./icons/com.soldar.landmarksquiz.png",
            logoquiz: "./icons/com.soldar.logoquiz.png",
            mindblowquiz: "./icons/com.soldar.mindblow.png",
            qetflix: "./icons/com.soldar.qetflix.png",
            steretypesquiz: "./icons/com.soldar.stereotypequiz.png",
            soccerquiz: "./icons/com.soldar.soccerquiz.png",
            gotquiz: "./icons/com.soldar.gotquiz.png"
        };

        const iconImg = document.getElementById("quiz-icon");
        iconImg.src = quizIcons[quizKey] || "";
        if (!quizIcons[quizKey]) iconImg.style.display = "none";

        async function getItems() {
            if (quiz.type === "categories") {
                const cat = urlParams.get('category') || Object.keys(quiz.categories)[0];
                const catData = quiz.categories[cat];
                const res = await fetch(catData.json);
                const data = await res.json();
                return { items: catData.type === "dict" ? Object.keys(data) : data, cat };
            } else if (quiz.type === "generations") {
                const res = await fetch(quiz.json);
                return { items: await res.json() };
            } else {
                const res = await fetch(quiz.json);
                const data = await res.json();
                return { items: quiz.type === "dict" ? Object.keys(data) : data };
            }
        }

        getItems().then(({ items, cat }) => {

            if (quiz.type === "generations") {
                const counts = quiz.counts;
                let startIndex = 0;

                for (let g = 0; g < counts.length; g++) {
                    const genCount = counts[g];
                    const genItems = items.slice(startIndex, startIndex + genCount);
                    startIndex += genCount;

                    const section = document.createElement("details");
                    section.open = false;

                    const summary = document.createElement("summary");
                    summary.textContent = `Generation ${g + 1}`;
                    section.appendChild(summary);

                    const container = document.createElement("div");
                    container.className = "levels-container";

                    const totalLevels = Math.ceil(genItems.length / 12);

                    for (let lvl = 0; lvl < totalLevels; lvl++) {
                        const levelBtn = document.createElement("div");
                        levelBtn.className = "level-btn";
                        levelBtn.textContent = `Level ${lvl + 1}`;

                        levelBtn.onclick = () => {
                            window.location.href =
                                `level.html?quiz=${quizKey}&generation=${g + 1}&level=${lvl + 1}`;
                        };

                        container.appendChild(levelBtn);
                    }

                    section.appendChild(container);
                    document.body.appendChild(section);
                }

                return;
            }

            if (quiz.type === "categories") {
                Object.entries(quiz.categories).forEach(([catName, catData]) => {
                    const section = document.createElement("details");
                    section.open = false;

                    const summary = document.createElement("summary");
                    summary.textContent = catName;
                    section.appendChild(summary);

                    const container = document.createElement("div");
                    container.className = "levels-container";

                    const fetchJson = async () => {
                        const res = await fetch(catData.json);
                        const data = await res.json();
                        return catData.type === "dict" ? Object.keys(data) : data;
                    };

                    fetchJson().then(catItems => {
                        const totalLevels = Math.ceil(catItems.length / 12);

                        for (let i = 0; i < totalLevels; i++) {
                            const levelBtn = document.createElement("div");
                            levelBtn.className = "level-btn";
                            levelBtn.textContent = `Level ${i + 1}`;

                            levelBtn.onclick = () => {
                                window.location.href =
                                    `level.html?quiz=${quizKey}&level=${i + 1}&category=${encodeURIComponent(catName)}`;
                            };

                            container.appendChild(levelBtn);
                        }
                    });

                    section.appendChild(container);
                    document.body.appendChild(section);
                });

                return;
            }

            const totalLevels = Math.ceil(items.length / 12);

            const wrapper = document.createElement("div");
            wrapper.className = "levels-container";

            for (let i = 0; i < totalLevels; i++) {
                const levelBtn = document.createElement("div");
                levelBtn.className = "level-btn";
                levelBtn.textContent = `Level ${i + 1}`;
                levelBtn.onclick = () => {
                    window.location.href = `level.html?quiz=${quizKey}&level=${i + 1}`;
                };
                wrapper.appendChild(levelBtn);
            }

            document.body.appendChild(wrapper);
        }).catch(error => {
            console.error("Failed to load quiz data:", error);
            const errorMsg = document.createElement("div");
            errorMsg.style.color = "white";
            errorMsg.style.fontSize = "24px";
            errorMsg.style.marginTop = "30px";
            errorMsg.style.textAlign = "center";
            errorMsg.innerHTML = `
                Failed to load quiz data.<br><br>
                Make sure you are serving the repo through a local server.<br>
                Example:<br>
                <code style="color:white;">python3 -m http.server 8000</code><br><br>
                Then open:<br>
                <code style="color:white;">http://localhost:8000/yourfile.html?quiz=dragonquiz</code>
            `;
            document.body.appendChild(errorMsg);
        });
    </script>
</body>

</html>
